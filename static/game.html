<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Go — Imperial Go</title>
  <meta name="description" content="Play a game of Go on Imperial Go — free, no account needed. Japanese rules with full scoring, captures, and dead-stone marking.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://imperial-go.org/">
  <meta property="og:title" content="Imperial Go — Play Go Online, Free">
  <meta property="og:description" content="Play Go online — free, no account needed. Choose 9×9, 13×13 or 19×19 boards. Play locally, against a bot, or in real-time with friends. Japanese rules with full scoring.">
  <meta property="og:image" content="https://imperial-go.org/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Imperial Go — Play Go Online, Free">
  <meta name="twitter:description" content="Play Go online — free, no account needed. Choose 9×9, 13×13 or 19×19 boards. Play locally, against a bot, or in real-time with friends. Japanese rules with full scoring.">
  <meta name="twitter:image" content="https://imperial-go.org/og-image.png">
  <link rel="canonical" href="https://imperial-go.org/">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=13">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#231915">
  <link rel="preload" href="js/board.js?v=7" as="script">
  <link rel="preload" href="js/render.js?v=7" as="script">
  <link rel="preload" href="js/ui.js?v=9" as="script">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7YT67WPS65"></script>
  <script src="js/analytics.js"></script>
</head>
<body class="game-page">

  <!-- ── Result overlay (resign / score confirmed) ───────────── -->
  <div id="result-overlay" class="result-overlay" style="display:none">
    <div class="result-card">
      <p id="result-message" class="result-message"></p>
      <button id="result-new-game-btn" class="btn-primary">New Game</button>
    </div>
  </div>

  <!-- ── Pass toast ───────────────────────────────────────────── -->
  <div id="pass-toast" class="pass-toast"></div>

  <!-- ── Takeback request banner (multiplayer only) ───────────── -->
  <div id="takeback-banner" class="takeback-banner" style="display:none">
    <p class="takeback-msg">Opponent requests a takeback.</p>
    <div class="takeback-actions">
      <button id="takeback-accept-btn" class="btn-primary">Accept</button>
      <button id="takeback-reject-btn" class="btn-ghost">Reject</button>
    </div>
  </div>

  <!-- ── Opponent disconnected banner (multiplayer only) ──────── -->
  <div id="mp-disconnect-banner" class="mp-disconnect-banner" style="display:none">
    <p class="mp-disconnect-msg">Your opponent disconnected.</p>
    <button id="mp-home-btn" class="btn-primary">Return Home</button>
  </div>

  <!-- ── Confirm modal ────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <p id="modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-confirm" class="btn-primary">Confirm</button>
        <button id="modal-cancel"  class="btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Info bar ──────────────────────────────────────────────── -->
  <header class="info-bar">
    <span class="brand-chip">Imperial Go</span>
    <div class="turn-block">
      <span id="stone-dot" class="stone-dot black"></span>
      <span id="turn-indicator" class="turn-indicator">Black's turn</span>
    </div>
    <!-- Countdown ring — shown only while bot is computing -->
    <div id="bot-timer" class="bot-timer" style="display:none">
      <svg class="bot-timer-svg" viewBox="0 0 36 36">
        <circle class="bot-timer-track" cx="18" cy="18" r="14"/>
        <circle id="bot-timer-arc"  class="bot-timer-arc"  cx="18" cy="18" r="14"/>
      </svg>
    </div>
    <span id="ko-indicator" class="ko-indicator">Ko</span>
    <div class="captures">
      <span>● <strong id="captures-black">0</strong></span>
      <span>○ <strong id="captures-white">0</strong></span>
      <span class="move-count">Move <strong id="move-counter">0</strong></span>
    </div>
  </header>

  <!-- ── Status flash ─────────────────────────────────────────── -->
  <div id="status-msg" class="status-msg"></div>

  <!-- ── Board + side score panels ───────────────────────────── -->
  <div class="game-area">

    <!-- Left: Black score (shown during scoring) -->
    <aside id="score-panel-black" class="score-side-panel" style="display:none">
      <div class="side-panel-title">
        <span class="stone-dot black"></span> Black
      </div>
      <div class="side-score-list">
        <div class="side-score-row">
          <span class="side-score-label">Territory</span>
          <span id="sp-black-territory" class="side-score-val">—</span>
        </div>
        <div class="side-score-row">
          <span class="side-score-label">Captures</span>
          <span id="sp-black-captures" class="side-score-val">—</span>
        </div>
        <div class="side-score-row">
          <span class="side-score-label">Dead opp.</span>
          <span id="sp-black-dead" class="side-score-val">—</span>
        </div>
      </div>
      <div class="side-panel-total">Total: <strong id="sp-black-total">—</strong></div>
    </aside>

    <!-- Board -->
    <div class="board-container">
      <canvas id="board-canvas" role="img" aria-label="Go board"></canvas>
      <div id="board-result" class="board-result" style="display:none">
        <div class="board-result-card">
          <p id="board-result-message" class="result-message"></p>
          <button id="board-result-new-game-btn" class="btn-primary">New Game</button>
        </div>
      </div>
    </div>

    <!-- Right: White score (shown during scoring) -->
    <aside id="score-panel-white" class="score-side-panel" style="display:none">
      <div class="side-panel-title">
        <span class="stone-dot white"></span> White
      </div>
      <div class="side-score-list">
        <div class="side-score-row">
          <span class="side-score-label">Territory</span>
          <span id="sp-white-territory" class="side-score-val">—</span>
        </div>
        <div class="side-score-row">
          <span class="side-score-label">Captures</span>
          <span id="sp-white-captures" class="side-score-val">—</span>
        </div>
        <div class="side-score-row">
          <span class="side-score-label">Dead opp.</span>
          <span id="sp-white-dead" class="side-score-val">—</span>
        </div>
        <div id="sp-white-komi-row" class="side-score-row" style="display:none">
          <span class="side-score-label">Komi</span>
          <span id="sp-white-komi" class="side-score-val">—</span>
        </div>
      </div>
      <div class="side-panel-total">Total: <strong id="sp-white-total">—</strong></div>
    </aside>

  </div>

  <!-- ── Playing controls ─────────────────────────────────────── -->
  <div id="controls" class="controls">
    <button id="pass-btn"     class="btn-ghost">Pass</button>
    <button id="end-game-btn" class="btn-ghost">End Game</button>
    <button id="undo-btn"     class="btn-ghost">Undo</button>
    <button id="resign-btn"   class="btn-ghost btn-danger">Resign</button>
  </div>

  <!-- ── Bot thinking indicator (replaces controls while bot computes) ── -->
  <div id="bot-thinking" class="bot-thinking" style="display:none">
    <span class="bot-thinking-dot"></span>
    <span id="bot-thinking-text" class="bot-thinking-text">White is thinking…</span>
  </div>

  <!-- ── Scoring panel (instructions + buttons only) ──────────── -->
  <section id="scoring-panel" class="scoring-panel" style="display:none">
    <p id="scoring-instructions" class="scoring-instructions">
      Click groups to mark dead stones. Confirm when both players agree.
    </p>
    <p id="scoring-mp-status" class="scoring-mp-status" style="display:none"></p>
    <div class="scoring-actions">
      <button id="confirm-score-btn"    class="btn-primary">Confirm Score</button>
      <button id="new-game-scoring-btn" class="btn-ghost">New Game</button>
    </div>
  </section>

  <script src="js/board.js?v=7"></script>
  <script src="js/render.js?v=7"></script>
  <script src="js/bot.js?v=1"></script>
  <script src="js/multiplayer.js?v=1"></script>
  <script src="js/ui.js?v=9"></script>
</body>
</html>
