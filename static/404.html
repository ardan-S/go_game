<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Imperial Go</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,251,244,0.7), transparent 40%),
        linear-gradient(135deg, #f2e8d8 0%, #e7d8be 100%);
      color: #221b16;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px;
      text-align: center;
    }
    .seal {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      border-radius: 11px;
      background: linear-gradient(180deg, #c84e42, #8a271b);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: #f5eee4;
      margin-bottom: 6px;
      box-shadow: 0 8px 20px rgba(139,39,27,0.28);
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 110px;
      font-weight: 700;
      line-height: 1;
      color: #1a1310;
      letter-spacing: -0.04em;
    }
    h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px;
      font-weight: 600;
      color: #3d2e24;
    }
    p {
      font-size: 16px;
      color: #6f6255;
      max-width: 320px;
      line-height: 1.6;
    }
    a {
      margin-top: 10px;
      display: inline-block;
      padding: 11px 28px;
      background: linear-gradient(180deg, #2c201a, #231915);
      color: #fbf6ee;
      border-radius: 999px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(35,25,21,0.2);
    }
  </style>
</head>
<body>
  <div class="seal">IG</div>
  <h1>404</h1>
  <h2>Page not found</h2>
  <p>This intersection doesn't exist. Try returning to the board.</p>
  <a href="/">Return home</a>
</body>
</html>
